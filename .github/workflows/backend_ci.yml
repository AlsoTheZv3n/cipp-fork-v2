name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cipp_test
          POSTGRES_USER: cipp
          POSTGRES_PASSWORD: cipp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run import check
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cipp:cipp_test@localhost:5432/cipp_test
          PYTHONPATH: .
        run: python -c "from app.main import app; print(f'OK: {len(list(app.routes))} routes loaded')"

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cipp:cipp_test@localhost:5432/cipp_test
          PYTHONPATH: .
        run: |
          pip install psycopg
          alembic upgrade head

      - name: Verify endpoint coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cipp:cipp_test@localhost:5432/cipp_test
          PYTHONPATH: .
        run: |
          python -c "
          from app.main import app
          backend = set()
          for route in app.routes:
              if hasattr(route, 'path'):
                  backend.add(route.path)
          print(f'Backend endpoints: {len(backend)}')
          assert len(backend) >= 480, f'Expected >=480 endpoints, got {len(backend)}'
          print('Endpoint count OK')
          "

      - name: Verify no duplicate routes
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cipp:cipp_test@localhost:5432/cipp_test
          PYTHONPATH: .
        run: |
          python -c "
          from app.main import app
          from collections import Counter
          paths = []
          for route in app.routes:
              if hasattr(route, 'path') and hasattr(route, 'methods'):
                  for method in route.methods:
                      paths.append(f'{method} {route.path}')
          dupes = [(p, c) for p, c in Counter(paths).items() if c > 1]
          assert len(dupes) == 0, f'Duplicate routes found: {dupes}'
          print('No duplicate routes')
          "

      - name: Verify MCP server loads
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://cipp:cipp_test@localhost:5432/cipp_test
          PYTHONPATH: .
        run: |
          python -c "
          from mcp_server import mcp
          tools = mcp._tool_manager.list_tools()
          print(f'MCP tools: {len(tools)}')
          assert len(tools) >= 20, f'Expected >=20 MCP tools, got {len(tools)}'
          print('MCP server OK')
          "

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t cipp-backend .

      - name: Build PS-Runner Docker image
        working-directory: backend/ps_runner
        run: docker build -t cipp-ps-runner .
