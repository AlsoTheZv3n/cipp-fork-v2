services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cipp
      POSTGRES_USER: cipp
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cipp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://cipp:${DB_PASSWORD}@db:5432/cipp
      PS_RUNNER_URL: http://ps-runner:8001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ps-runner:
    build: ./ps_runner
    environment:
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_CERT_THUMBPRINT: ${AZURE_CERT_THUMBPRINT:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
